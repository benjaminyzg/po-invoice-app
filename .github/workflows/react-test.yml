name: React CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Change this if your folder name is different
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Or your version
        
    - name: Install Dependencies
      run: npm install
      
    - name: Build
      run: npm run build # This checks that your React app builds without errors
