name: React CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Latest stable is recommended for modern Vite/React 19
        cache: 'npm' # This speeds up your workflow by caching dependencies
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm install
      
    - name: Lint Code
      run: npm run lint # Runs your Oxlint check automatically

    - name: Build Project
      run: npm run build # Runs 'vite build' as defined in your package.json
