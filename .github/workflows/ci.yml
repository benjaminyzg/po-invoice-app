name: CI Checks

# When should this workflow run?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-runs-on: ubuntu-latest  # Runs on a clean cloud server

    steps:
      # 1. Pull your code into the virtual machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install packages (fast, clean install)
      - name: Install dependencies
        run: npm ci

      # 4. Check if the app builds successfully
      - name: Build project
        run: npm run build
